<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-label="Automation ladder: from simple scripts to managed agents">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#555" /></marker></defs>
<rect width="100%" height="100%" fill="#fbfbfd"/>
<text x="550.0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Automation ladder: from simple scripts to managed agents</text>
<rect x="35" y="105" width="130" height="85" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="100.0" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">HTTP script</text>
<text x="100.0" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">no browser</text>
<rect x="185" y="105" width="130" height="85" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="250.0" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Userscript</text>
<text x="250.0" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">real browser</text>
<rect x="335" y="105" width="130" height="85" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="400.0" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Extension</text>
<text x="400.0" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">browser APIs</text>
<rect x="485" y="105" width="130" height="85" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="550.0" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Selenium</text>
<text x="550.0" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">WebDriver</text>
<rect x="635" y="105" width="130" height="85" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="700.0" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Playwright</text>
<text x="700.0" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">browser control</text>
<rect x="785" y="105" width="130" height="85" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="850.0" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Stealth</text>
<text x="850.0" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">patch artefacts</text>
<rect x="935" y="105" width="130" height="85" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="1000.0" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Cloud/API</text>
<text x="1000.0" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">managed scale</text>
<rect x="385" y="285" width="330" height="90" rx="16" fill="#eef6ff" stroke="#2563eb" stroke-width="2"/>
<text x="550.0" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">AI browser agent</text>
<text x="550.0" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">planning layer on top of browser/tool infrastructure</text>
<line x1="165" y1="147" x2="185" y2="147" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="315" y1="147" x2="335" y2="147" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="465" y1="147" x2="485" y2="147" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="615" y1="147" x2="635" y2="147" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="765" y1="147" x2="785" y2="147" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="915" y1="147" x2="935" y2="147" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="1000" y1="190" x2="640" y2="285" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="820.0" y="229.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">can be substrate</text>
<text x="550.0" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">This is a taxonomy of capability, not a claim that every use is abusive.</text>
</svg>