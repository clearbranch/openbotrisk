<svg xmlns="http://www.w3.org/2000/svg" width="930" height="410" viewBox="0 0 930 410" role="img" aria-label="What the site sees from network origin">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#555" /></marker></defs>
<rect width="100%" height="100%" fill="#fbfbfd"/>
<text x="465.0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">What the site sees from network origin</text>
<rect x="70" y="120" width="180" height="110" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="160.0" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">User device</text>
<text x="160.0" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">phone / laptop</text>
<text x="160.0" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">browser or app</text>
<rect x="330" y="80" width="210" height="90" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
<text x="435.0" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Shared network</text>
<text x="435.0" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">home router</text>
<text x="435.0" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">work / university</text>
<text x="435.0" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">mobile carrier NAT</text>
<rect x="330" y="230" width="210" height="90" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
<text x="435.0" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Intermediary</text>
<text x="435.0" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">VPN / proxy</text>
<text x="435.0" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">cloud or residential exit</text>
<rect x="650" y="120" width="210" height="110" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="755.0" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Website</text>
<text x="755.0" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">sees source IP</text>
<text x="755.0" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">plus protocol details</text>
<line x1="250" y1="160" x2="330" y2="125" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="290.0" y="134.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">often</text>
<line x1="250" y1="170" x2="330" y2="275" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="290.0" y="214.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">sometimes</text>
<line x1="540" y1="125" x2="650" y2="160" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="540" y1="275" x2="650" y2="175" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="465.0" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">Same IP ≠ same person. Different IP ≠ different person.</text>
</svg>