<svg xmlns="http://www.w3.org/2000/svg" width="990" height="450" viewBox="0 0 990 450" role="img" aria-label="The foundation chain">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#555" /></marker></defs>
<rect width="100%" height="100%" fill="#fbfbfd"/>
<text x="495.0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">The foundation chain</text>
<rect x="35" y="100" width="160" height="110" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="115.0" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Network</text>
<text x="115.0" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">IP address</text>
<text x="115.0" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">ASN / origin</text>
<rect x="225" y="100" width="160" height="110" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="305.0" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Request</text>
<text x="305.0" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">HTTP headers</text>
<text x="305.0" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">User-Agent</text>
<rect x="415" y="100" width="160" height="110" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="495.0" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">State</text>
<text x="495.0" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">cookies</text>
<text x="495.0" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">sessions</text>
<rect x="605" y="100" width="160" height="110" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="685.0" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Browser</text>
<text x="685.0" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">fingerprint</text>
<text x="685.0" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">JavaScript signals</text>
<rect x="795" y="100" width="160" height="110" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="875.0" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Behaviour</text>
<text x="875.0" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">timing</text>
<text x="875.0" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">journey / account</text>
<rect x="410" y="290" width="280" height="120" rx="16" fill="#eef6ff" stroke="#2563eb" stroke-width="2"/>
<text x="550.0" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Risk judgement</text>
<text x="550.0" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">allow · challenge · rate limit</text>
<text x="550.0" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">block · log · stronger auth</text>
<line x1="195" y1="155" x2="225" y2="155" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="385" y1="155" x2="415" y2="155" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="575" y1="155" x2="605" y2="155" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="765" y1="155" x2="795" y2="155" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="875" y1="210" x2="550" y2="290" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="712.5" y="242.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">combined</text>
<text x="495.0" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">None of these signals is proof on its own. The decision comes from the bundle.</text>
