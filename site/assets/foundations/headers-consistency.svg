<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="430" viewBox="0 0 1080 430" role="img" aria-label="Headers are claims that can be checked for consistency">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#555" /></marker></defs>
<rect width="100%" height="100%" fill="#fbfbfd"/>
<text x="540.0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Headers are claims that can be checked for consistency</text>
<rect x="55" y="110" width="190" height="115" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="150.0" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">User-Agent</text>
<text x="150.0" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">claims browser</text>
<text x="150.0" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">and platform</text>
<rect x="305" y="110" width="190" height="115" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="400.0" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Other headers</text>
<text x="400.0" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">Accept-Language</text>
<text x="400.0" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">Cookie</text>
<text x="400.0" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">Client Hints</text>
<rect x="555" y="110" width="190" height="115" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="650.0" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Protocol details</text>
<text x="650.0" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">TLS / HTTP version</text>
<text x="650.0" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">order / quirks</text>
<rect x="805" y="110" width="220" height="115" rx="16" fill="#eef6ff" stroke="#2563eb" stroke-width="2"/>
<text x="915.0" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Consistency check</text>
<text x="915.0" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">do the claims fit</text>
<text x="915.0" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">together?</text>
<rect x="330" y="290" width="430" height="90" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="545.0" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Useful mainly as part of a bundle</text>
<text x="545.0" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">spoofable alone · stronger when mismatched with browser/IP/behaviour</text>
<line x1="245" y1="165" x2="305" y2="165" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="495" y1="165" x2="555" y2="165" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="745" y1="165" x2="805" y2="165" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="915" y1="225" x2="545" y2="290" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="730.0" y="249.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">feeds</text>
</svg>