<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400" role="img" aria-label="Why IP reputation is useful but messy">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#555" /></marker></defs>
<rect width="100%" height="100%" fill="#fbfbfd"/>
<text x="480.0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Why IP reputation is useful but messy</text>
<rect x="55" y="110" width="190" height="100" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="150.0" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Many users</text>
<text x="150.0" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">one home, office</text>
<text x="150.0" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">or carrier IP</text>
<rect x="330" y="70" width="190" height="100" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="425.0" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">One bot</text>
<text x="425.0" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">many rotating</text>
<text x="425.0" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">proxy exits</text>
<rect x="330" y="220" width="190" height="100" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="425.0" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Real user</text>
<text x="425.0" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">VPN / privacy</text>
<text x="425.0" y="304" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">work network</text>
<rect x="675" y="110" width="230" height="100" rx="16" fill="#eef6ff" stroke="#2563eb" stroke-width="2"/>
<text x="790.0" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Risk signal</text>
<text x="790.0" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">network type</text>
<text x="790.0" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">ASN · reputation</text>
<text x="790.0" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">rate history</text>
<line x1="245" y1="160" x2="675" y2="160" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="460.0" y="152.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">shared IP</text>
<line x1="520" y1="120" x2="675" y2="145" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="597.5" y="124.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">rotation</text>
<line x1="520" y1="270" x2="675" y2="185" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="597.5" y="219.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">legitimate oddity</text>
</svg>