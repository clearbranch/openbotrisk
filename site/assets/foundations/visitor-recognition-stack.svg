<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="430" viewBox="0 0 1060 430" role="img" aria-label="Visitor recognition is a layered picture">
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#555" /></marker></defs>
<rect width="100%" height="100%" fill="#fbfbfd"/>
<text x="530.0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Visitor recognition is a layered picture</text>
<rect x="80" y="90" width="205" height="85" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="182.5" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Network</text>
<text x="182.5" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">IP · ASN · proxy</text>
<rect x="80" y="190" width="205" height="85" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="182.5" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Request</text>
<text x="182.5" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">headers · client hints</text>
<rect x="80" y="290" width="205" height="85" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="182.5" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">State</text>
<text x="182.5" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">cookies · session</text>
<rect x="405" y="140" width="230" height="85" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="520.0" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Browser</text>
<text x="520.0" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">fingerprint · JS checks</text>
<rect x="405" y="250" width="230" height="85" rx="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
<text x="520.0" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Behaviour</text>
<text x="520.0" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">timing · path · input</text>
<rect x="755" y="190" width="230" height="100" rx="16" fill="#eef6ff" stroke="#2563eb" stroke-width="2"/>
<text x="870.0" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Account/context</text>
<text x="870.0" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">history · endpoint</text>
<text x="870.0" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#374151">login vs public page</text>
<line x1="285" y1="132" x2="405" y2="175" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="285" y1="232" x2="405" y2="185" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="285" y1="332" x2="405" y2="300" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="635" y1="182" x2="755" y2="220" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<line x1="635" y1="292" x2="755" y2="250" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
<text x="530.0" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">Recognition is not proof. It is context for a risk decision.</text>
